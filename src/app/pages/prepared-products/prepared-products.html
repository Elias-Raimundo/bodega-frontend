<div class="prepared-products">

  <div class="header">
    <h1>🍹 Tragos</h1>
  </div>

  <!-- FORMULARIO -->
  <div class="form-card">

    <h3>
      {{ editingId ? 'Editar preparado' : 'Nuevo preparado' }}
    </h3>

    <div class="form-grid">

      <div class="field">
        <label>Nombre</label>

        <input
          type="text"
          [(ngModel)]="form.name"
          placeholder="Ej: Fernet con Coca"
        >
      </div>

      <div class="field">
        <label>Precio</label>

        <input
          type="number"
          [(ngModel)]="form.price"
        >
      </div>

    </div>

    <div class="ingredients-box">

      <div class="ingredients-header">
        <h4>Ingredientes</h4>

        <button
          class="add-ingredient-btn"
          (click)="addIngredient()"
        >
          + Ingrediente
        </button>
      </div>

      <div
        class="ingredient-row"
        *ngFor="let ingredient of form.ingredients; let i = index"
      >

        <div class="field">
          <label>Producto</label>

          <select [(ngModel)]="ingredient.productId">

            <option [ngValue]="null">
              Seleccionar producto
            </option>

            <option
              *ngFor="let product of products"
              [ngValue]="product.id"
            >
              {{ product.name }}
            </option>

          </select>
        </div>

        <div class="field">
          <label>Cantidad que descuenta</label>

          <input
            type="number"
            min="0"
            step="0.01"
            [(ngModel)]="ingredient.quantity"
            placeholder="Ej: 0.15"
          >
        </div>

        <button
          class="remove-ingredient-btn"
          type="button"
          (click)="removeIngredient(i)"
          [disabled]="form.ingredients.length === 1"
        >
          ✕
        </button>

      </div>

    </div>

    <div class="form-actions">

      <button
        class="save-btn"
        (click)="savePreparedProduct()"
      >
        {{
          editingId
            ? 'Actualizar preparado'
            : 'Guardar preparado'
        }}
      </button>

      <button
        class="cancel-btn"
        *ngIf="editingId"
        (click)="cancelEdit()"
      >
        Cancelar
      </button>

    </div>

  </div>

  <!-- LISTA -->
  <div class="table-card">

    <h3>Preparados creados</h3>

    <div
      class="empty"
      *ngIf="!preparedProducts.length"
    >
      No hay preparados registrados.
    </div>

    <div
      class="prepared-row"
      *ngFor="let prepared of preparedProducts"
      [class.editing]="editingId === prepared.id"
    >

      <div class="prepared-info">

        <div class="prepared-name">
          {{ prepared.name }}
        </div>

        <div class="prepared-detail">
          {{ getIngredientText(prepared) }}
        </div>

      </div>

      <div class="prepared-price">
        ${{ prepared.price | number:'1.0-0' }}
      </div>

      <div class="prepared-actions">

        <button
          class="edit-btn"
          (click)="editPreparedProduct(prepared)"
        >
          Editar
        </button>

        <button
          class="delete-btn"
          (click)="deletePreparedProduct(prepared.id)"
        >
          Eliminar
        </button>

      </div>

    </div>

  </div>

</div>
