<div class="auth-page">

  <div class="auth-card">

    <h1>🔒 Recuperar contraseña</h1>

    <p class="subtitle">
      Restablecé el acceso a tu cuenta
    </p>

    <!-- PASO 1 -->
    <div *ngIf="step === 1" class="step-box">

      <input
        type="email"
        placeholder="Correo electrónico"
        [(ngModel)]="email"
      />

      <button
        (click)="sendCode()"
        [disabled]="loading"
      >
        {{ loading ? 'Enviando...' : 'Enviar código' }}
      </button>

    </div>

    <!-- PASO 2 -->
    <div *ngIf="step === 2" class="step-box">

      <p class="email-info">
        Enviamos un código a:
        <strong>{{ email }}</strong>
      </p>

      <input
        type="text"
        maxlength="6"
        placeholder="Código de 6 dígitos"
        [(ngModel)]="code"
      />

      <!-- Nueva contraseña -->
      <div class="password-field">

        <input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Nueva contraseña"
          [(ngModel)]="newPassword"
        />

        <button
          type="button"
          class="eye-btn"
          (click)="showPassword = !showPassword"
        >
          <i
            class="bi"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword"
          ></i>
        </button>

      </div>

      <!-- Confirmar contraseña -->
      <div class="password-field">

        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Confirmar contraseña"
          [(ngModel)]="confirmPassword"
        />

        <button
          type="button"
          class="eye-btn"
          (click)="showConfirmPassword = !showConfirmPassword"
        >
          <i
            class="bi"
            [class.bi-eye]="!showConfirmPassword"
            [class.bi-eye-slash]="showConfirmPassword"
          ></i>
        </button>

      </div>

      <p
        *ngIf="confirmPassword && newPassword !== confirmPassword"
        class="error-text"
      >
        Las contraseñas no coinciden
      </p>

      <button
        (click)="reset()"
        [disabled]="loading"
      >
        {{ loading ? 'Actualizando...' : 'Cambiar contraseña' }}
      </button>

      <button
        class="secondary-btn"
        (click)="backToEmail()"
        [disabled]="loading"
      >
        Cambiar email
      </button>

    </div>

  </div>

</div>
